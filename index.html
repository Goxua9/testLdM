];


function shuffle(array)
{
    for(let i = array.length - 1; i > 0; i--)
    {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

const shuffledQuestions = shuffle([...questions]).map(
    question =>
    {
        return {
            ...question,
            answers: shuffle([...question.answers])
        };
    }
);

const quiz = document.getElementById("quiz");

function createAnswer(answer, questionIndex, answerIndex)
{
    const label = document.createElement("label");
    label.className = "answer";

    const input = document.createElement("input");
    input.type = "radio";
    input.name = `question-${questionIndex}`;
    input.value = answer.correct ? "true" : "false";

    const letter = document.createElement("span");
    letter.className = "letter";
    letter.textContent = String.fromCharCode(65 + answerIndex);

    const answerText = document.createElement("span");
    answerText.className = "answer-text";
    answerText.textContent = answer.text;

    label.appendChild(input);
    label.appendChild(letter);
    label.appendChild(answerText);

    return label;
}

function createQuestion(question, questionIndex)
{
    const article = document.createElement("article");
    article.className = "question";

    const title = document.createElement("h2");
    title.textContent = `${questionIndex + 1}. ${question.question}`;

    const answers = document.createElement("div");
    answers.className = "answers";

    question.answers.forEach(
        (answer, answerIndex) =>
        {
            answers.appendChild(createAnswer(answer, questionIndex, answerIndex));
        }
    );

    article.appendChild(title);
    article.appendChild(answers);

    return article;
}

shuffledQuestions.forEach(
    (question, questionIndex) =>
    {
        quiz.appendChild(createQuestion(question, questionIndex));
    }
);

document.getElementById("submitButton").addEventListener(
    "click",
    () =>
    {
        let score = 0;

        shuffledQuestions.forEach(
            (question, questionIndex) =>
            {
                const answers = document.querySelectorAll(`input[name="question-${questionIndex}"]`);

                answers.forEach(
                    answer =>
                    {
                        const label = answer.parentElement;

                        label.classList.remove("correct");
                        label.classList.remove("incorrect");

                        if(answer.checked)
                        {
                            if(answer.value === "true")
                            {
                                score++;
                                label.classList.add("correct");
                            }
                            else
                            {
                                label.classList.add("incorrect");
                            }
                        }

                        if(answer.value === "true")
                        {
                            label.classList.add("correct");
                        }
                    }
                );
            }
        );

        const result = document.getElementById("result");
        result.textContent = `Has acertado ${score} de ${shuffledQuestions.length} preguntas.`;

        result.scrollIntoView(
            {
                behavior: "smooth"
            }
        );
    }
);

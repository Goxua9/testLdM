<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test LMSGI</title>
<style>
*
{
    box-sizing: border-box;
}

body
{
    margin: 0;
    padding: 40px 20px;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
    color: #222;
}

.container
{
    max-width: 900px;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h1
{
    margin-top: 0;
    text-align: center;
}

.question
{
    margin-bottom: 35px;
    padding-bottom: 20px;
    border-bottom: 1px solid #ddd;
}

.question h2
{
    font-size: 20px;
    margin-bottom: 15px;
}

.answers
{
    display: grid;
    gap: 10px;
}

.answer
{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.answer:hover
{
    background: #f0f7ff;
}

button
{
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

button:hover
{
    background: #1d4ed8;
}

.result
{
    margin-top: 30px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.correct
{
    background: #dcfce7;
    border-color: #22c55e;
}

.incorrect
{
    background: #fee2e2;
    border-color: #ef4444;
}
</style>
</head>
<body>
<div class="container">
    <h1>Test LMSGI</h1>
    <div id="quiz"></div>
    <button id="submitButton">Corregir examen</button>
    <div class="result" id="result"></div>
</div>

<script>
const questions = [
    {
        question: '¿Qué etiqueta define el titulo que aparece en la pestaña del navegador?',
        answers: [
            {text: '<title>', correct: true},
            {text: '<header>', correct: false},
            {text: '<h1>', correct: false},
            {text: '<meta>', correct: false}
        ]
    },
    {
        question: '¿Qué parte del documento contiene información técnica para el navegador y no se ve como contenido?',
        answers: [
            {text: '<body>', correct: false},
            {text: '<footer>', correct: false},
            {text: '<head>', correct: true},
            {text: '<main>', correct: false}
        ]
    },
    {
        question: '¿Cuál es la diferencia correcta entre <div> y <span>?',
        answers: [
            {text: '<div> es en linea y <span> es en bloque', correct: false},
            {text: '<div> es en bloque y <span> es en linea', correct: true},
            {text: 'Ambas son siempre en bloque', correct: false},
            {text: 'Ambas son siempre en linea', correct: false}
        ]
    },
    {
        question: '¿Qué conjunto define los encabezados HTML?',
        answers: [
            {text: '<p> a <p6>', correct: false},
            {text: '<head1> a <head6>', correct: false},
            {text: '<t1> a <t6>', correct: false},
            {text: '<h1> a <h6>', correct: true}
        ]
    },
    {
        question: '¿Qué valor de target abre el enlace en una nueva pestaña/ventana?',
        answers: [
            {text: '_self', correct: false},
            {text: '_parent', correct: false},
            {text: '_top', correct: false},
            {text: '_blank', correct: true}
        ]
    },
    {
        question: '¿Qué etiqueta se usa para listas no ordenadas?',
        answers: [
            {text: '<ol>', correct: false},
            {text: '<li>', correct: false},
            {text: '<dl>', correct: false},
            {text: '<ul>', correct: true}
        ]
    },
    {
        question: '¿Qué etiqueta agrupa campos de un formulario?',
        answers: [
            {text: '<input>', correct: false},
            {text: '<select>', correct: false},
            {text: '<form>', correct: true},
            {text: '<label>', correct: false}
        ]
    },
    {
        question: 'En tablas HTML, ¿qué etiqueta define una fila?',
        answers: [
            {text: '<td>', correct: false},
            {text: '<tr>', correct: true},
            {text: '<th>', correct: false},
            {text: '<table>', correct: false}
        ]
    },
    {
        question: '¿Qué regla de diseño se destaca como fundamental?',
        answers: [
            {text: 'Separar el contenido del estilo', correct: true},
            {text: 'Unir estilo y contenido para reducir archivos', correct: false},
            {text: 'Escribir todo con etiquetas semánticas HTML5', correct: false},
            {text: 'Usar siempre estilos inline por claridad', correct: false}
        ]
    },
    {
        question: '¿Qué selector aplica estilo a un enlace SOLO cuando el puntero está encima?',
        answers: [
            {text: 'a:active', correct: false},
            {text: 'a:visited', correct: false},
            {text: 'a:link', correct: false},
            {text: 'a:hover', correct: true}
        ]
    },
    {
        question: '¿Qué formato se recomienda como habitual para colores en CSS según el material?',
        answers: [
            {text: 'Nombres de color (red, blue...)', correct: false},
            {text: 'RGB porcentual', correct: false},
            {text: 'RGB hexadecimal (ej. #476280)', correct: true},
            {text: 'HSL únicamente', correct: false}
        ]
    },
    {
        question: '¿Qué valor de text-transform pone TODO el texto en mayúsculas?',
        answers: [
            {text: 'capitalize', correct: false},
            {text: 'uppercase', correct: true},
            {text: 'lowercase', correct: false},
            {text: 'inherit', correct: false}
        ]
    },
    {
        question: '¿Qué valor de overflow muestra barras SOLO si hacen falta?',
        answers: [
            {text: 'scroll', correct: false},
            {text: 'hidden', correct: false},
            {text: 'visible', correct: false},
            {text: 'auto', correct: true}
        ]
    },
    {
        question: '¿Qué valor de visibility oculta un elemento pero manteniendo su espacio?',
        answers: [
            {text: 'hidden', correct: true},
            {text: 'none', correct: false},
            {text: 'collapse', correct: false},
            {text: 'invisible', correct: false}
        ]
    },
    {
        question: '¿Qué regla de media query apunta a pantallas con ancho máximo de 768px?',
        answers: [
            {text: '@media screen and (max-width: 768px)', correct: true},
            {text: '@media screen and (min-width: 768px)', correct: false},
            {text: '@media print and (max-width: 768px)', correct: false},
            {text: '@media all and (min-height: 768px)', correct: false}
        ]
    },
    {
        question: 'La propiedad abreviada gap en Grid...',
        answers: [
            {text: 'Puede establecer row-gap y column-gap (en ese orden)', correct: true},
            {text: 'Solo afecta a columnas', correct: false},
            {text: 'Solo afecta a filas', correct: false},
            {text: 'Sustituye a padding', correct: false}
        ]
    },
    {
        question: '¿Qué propiedad permite nombrar áreas de la rejilla con cadenas tipo encabezado?',
        answers: [
            {text: 'grid-area', correct: false},
            {text: 'grid-template-areas', correct: true},
            {text: 'grid-names', correct: false},
            {text: 'template-areas', correct: false}
        ]
    },
    {
        question: '¿Qué valor coloca los elementos en fila, pero en orden inverso?',
        answers: [
            {text: 'row-inverse', correct: false},
            {text: 'reverse-row', correct: false},
            {text: 'row-reverse', correct: true},
            {text: 'invert-row', correct: false}
        ]
    },
    {
        question: '¿Qué propiedad cambia el orden visual de un flex-item sin modificar el HTML?',
        answers: [
            {text: 'z-index', correct: false},
            {text: 'position', correct: false},
            {text: 'order', correct: true},
            {text: 'float', correct: false}
        ]
    },
    {
        question: 'Todo documento XML debe tener...',
        answers: [
            {text: 'Dos elementos raíz', correct: false},

            {text: 'Un único elemento raíz', correct: true}
        ]
    },
    {
        question: 'Los valores de los atributos pueden ir...',
        answers: [
            {text: 'Con comillas dobles o simples', correct: true},
            {text: 'Sin comillas', correct: false},
            {text: 'Solo con comillas dobles', correct: false},
            {text: 'Solo entre paréntesis', correct: false}
        ]
    },
    {
        question: '¿Cuál es la forma correcta de un elemento vacío?',
        answers: [
            {text: '<foto> </foto/>', correct: false},
            {text: '</foto>', correct: false},
            {text: '<foto/>', correct: true},
            {text: '<foto>', correct: false}
        ]
    },
    {
        question: '¿Cuál de estos nombres de etiqueta es válido como primer carácter?',
        answers: [
            {text: '<2alumnos>', correct: false},
            {text: '<_alumno>', correct: true},
            {text: '<-alumno>', correct: false},
            {text: '<.alumno>', correct: false}
        ]
    },
    {
        question: 'En DTD, para definir atributos se usa...',
        answers: [
            {text: '<!ATTR>', correct: false},
            {text: '<!ATTRIBUTE>', correct: false},
            {text: '<!ELEMENTS>', correct: false},
            {text: '<!ATTLIST>', correct: true}
        ]
    },
    {
        question: '¿Cómo se selecciona un atributo en xsl:value-of?',
        answers: [
            {text: 'select="año"', correct: false},
            {text: 'select="#año"', correct: false},
            {text: 'select="::año"', correct: false},
            {text: 'select="@año"', correct: true}
        ]
    },
    {
        question: '¿Qué clase crea un contenedor que ocupa el 100% del ancho disponible?',
        answers: [
            {text: '.container-fluid', correct: true},
            {text: '.container', correct: false},
            {text: '.container-sm', correct: false},
            {text: '.w-75', correct: false}
        ]
    },
    {
        question: '¿Cuántas columnas tiene la rejilla de Bootstrap por defecto?',
        answers: [
            {text: '10', correct: false},
            {text: '12', correct: true},
            {text: '16', correct: false},
            {text: 'Depende del navegador', correct: false}
        ]
    },
    {
        question: '¿Qué clase se usa para añadir relleno (padding) en Bootstrap?',
        answers: [
            {text: 'm-*', correct: false},
            {text: 'pd-*', correct: false},
            {text: 'p-*', correct: true},
            {text: 'g-*', correct: false}
        ]
    },
    {
        question: 'En JavaScript, ¿cuál es la forma correcta de declarar una variable que puede cambiar su valor?',
        answers: [
            {text: 'let nombre = "Ana";', correct: true},
            {text: 'const nombre = "Ana";', correct: false},
            {text: 'define nombre = "Ana";', correct: false},
            {text: 'var: nombre = "Ana";', correct: false}
        ]
    },
    {
        question: 'En JavaScript, ¿qué resultado devuelve console.log("5" - 2); ?',
        answers: [
            {text: '"52"', correct: false},
            {text: '"3"', correct: false},
            {text: '52', correct: false},
            {text: '3', correct: true}
        ]
    }
];

function shuffle(array)
{
    for(let i = array.length - 1; i > 0; i--)
    {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

const shuffledQuestions = shuffle([...questions]).map(
    question =>
    {
        return {
            ...question,
            answers: shuffle([...question.answers])
        };
    }
);

const quiz = document.getElementById('quiz');

shuffledQuestions.forEach(
    (question, questionIndex) =>
    {
        const questionElement = document.createElement('div');
        questionElement.className = 'question';

        questionElement.innerHTML = `
            <h2>${questionIndex + 1}. ${question.question}</h2>
            <div class="answers">
                ${question.answers.map(
                    (answer, answerIndex) =>
                    {
                        return `
                            <label class="answer">
                                <input
                                    type="radio"
                                    name="question-${questionIndex}"
                                    value="${answer.correct}"
                                />
                                ${String.fromCharCode(65 + answerIndex)}. ${answer.text}
                            </label>
                        `;
                    }
                ).join('')}
            </div>
        `;

        quiz.appendChild(questionElement);
    }
);

document.getElementById('submitButton').addEventListener(
    'click',
    () =>
    {
        let score = 0;

        shuffledQuestions.forEach(
            (question, questionIndex) =>
            {
                const answers = document.querySelectorAll(`input[name="question-${questionIndex}"]`);

                answers.forEach(
                    answer =>
                    {
                        const label = answer.parentElement;

                        label.classList.remove('correct');
                        label.classList.remove('incorrect');

                        if(answer.checked)
                        {
                            if(answer.value === 'true')
                            {
                                score++;
                                label.classList.add('correct');
                            }
                            else
                            {
                                label.classList.add('incorrect');
                            }
                        }
                    }
                );
            }
        );

        document.getElementById('result').textContent = `Has acertado ${score} de ${shuffledQuestions.length} preguntas.`;

        window.scrollTo(
            {
                top: document.body.scrollHeight,
                behavior: 'smooth'
            }
        );
    }
);
</script>
</body>
</html>
